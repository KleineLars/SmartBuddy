<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SmartPong.io</title>
<style>
:root {
  --sg-accent: #ec4899; /* Neon Pink */
  --sg-base01: #080808;
  --sg-border: rgba(236,72,153,0.2);
  --sg-text: #ffffff;
  --sg-muted: #888888;
}

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--sg-base01); font-family: 'Inter', system-ui, sans-serif; overflow: hidden; color: var(--sg-text); touch-action: none; user-select: none; }
canvas { display: block; }

/* ?? HUD ?? */
#ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

#hud-scores { position: absolute; top: 24px; width: 100%; display: flex; justify-content: center; gap: 120px; }
.score-box { display: flex; flex-direction: column; align-items: center; }
.score-val { font-size: clamp(48px, 6vw, 72px); font-weight: 900; letter-spacing: -0.03em; color: #ffffff; line-height: 1; }
.score-label { font-size: 13px; letter-spacing: 4px; text-transform: uppercase; color: var(--sg-muted); font-weight: 700; margin-top: 8px; }

#ctrl-hint { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); font-size: 12px; letter-spacing: 3px; color: var(--sg-muted); font-weight: 700; text-transform: uppercase; text-align: center; }
#status-msg { position: absolute; top: 120px; left: 50%; transform: translateX(-50%); font-size: 14px; letter-spacing: 2px; color: var(--sg-accent); font-weight: 700; text-transform: uppercase; text-align: center; }

/* Screens */
.screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; pointer-events: all; padding: 24px; text-align: center; }
.hidden { display: none !important; }

/* Start Screen */
#start-screen { background: var(--sg-base01); }
#start-bg { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
#start-content { position: relative; z-index: 1; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 50px 40px; width: 600px; max-width: 90vw; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }

.game-title { font-size: clamp(48px, 8vw, 64px); font-weight: 900; letter-spacing: -0.04em; margin-bottom: 8px; line-height: 1; }
.game-title .t1 { color: #fff; }
.game-title .t2 { color: var(--sg-accent); }
.game-sub { font-size: 13px; letter-spacing: 6px; text-transform: uppercase; color: var(--sg-muted); margin-bottom: 40px; font-weight: 700; }

.play-btn { background: var(--sg-accent); border: none; border-radius: 12px; padding: 18px 48px; font-size: 16px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #fff; cursor: pointer; transition: all 0.2s cubic-bezier(0.16,1,0.3,1); font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 16px; }
.play-btn:hover { transform: translateY(-3px); background: #f472b6; }
.play-btn:active { transform: translateY(1px); }

.play-btn.secondary { background: #111; color: #fff; border: 1px solid var(--sg-border); margin-bottom: 32px; }
.play-btn.secondary:hover { background: #222; border-color: var(--sg-accent); }

.name-input { background: #111; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 18px 24px; font-size: 18px; font-weight: 700; color: #fff; text-align: center; width: 100%; box-sizing: border-box; outline: none; font-family: inherit; margin-bottom: 24px; transition: all 0.2s; }
.name-input:focus { border-color: var(--sg-accent); background: #222; }

/* Matchmaking Screen */
#matchmaking-screen { background: rgba(8,8,8,0.95); backdrop-filter: blur(10px); }
.spinner { width: 48px; height: 48px; border: 4px solid rgba(236,72,153,0.2); border-top: 4px solid var(--sg-accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 24px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* Game Over Screen */
#death-screen { background: rgba(17,17,17,0.9); backdrop-filter: blur(8px); }
.death-title { font-size: clamp(48px, 8vw, 72px); font-weight: 900; letter-spacing: -0.04em; color: var(--sg-accent); margin-bottom: 24px; }
.death-stats { font-size: 24px; font-weight: 700; margin-bottom: 48px; color: #fff; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="ui">
  <div id="hud-scores">
    <div class="score-box">
      <div class="score-val" id="score-p1">0</div>
      <div class="score-label" id="label-p1">Player 1</div>
    </div>
    <div class="score-box">
      <div class="score-val" id="score-p2">0</div>
      <div class="score-label" id="label-p2">Player 2</div>
    </div>
  </div>
  <div id="status-msg"></div>
  <div id="ctrl-hint">BEWEEG MET MUIS OF TOUCH</div>
</div>

<!-- Start -->
<div id="start-screen" class="screen">
  <canvas id="start-bg"></canvas>
  <div id="start-content">
    <div class="game-title" style="color: #fff;"><span class="t1">Smart</span><span class="t2">Pong.io</span></div>
    <div class="game-sub" style="font-size: 14px; letter-spacing: 2px; color: #888; margin-bottom: 30px; text-transform: uppercase;">Neon Table Tennis</div>
    
    <button class="play-btn" id="btn-play-online">ONLINE SPELEN</button>
    <button class="play-btn secondary" id="btn-play-bot">TEGEN COMPUTER</button>
    
  </div>
</div>

<!-- Matchmaking -->
<div id="matchmaking-screen" class="screen hidden">
  <div class="spinner"></div>
  <div class="game-title" style="font-size: 32px; color: #fff;">ZOEKEN NAAR TEGENSTANDER...</div>
  <button class="play-btn secondary" id="btn-cancel-match" style="max-width: 200px; margin-top: 32px; padding: 12px;">ANNULEREN</button>
</div>

<!-- Game Over -->
<div id="death-screen" class="screen hidden">
  <div class="death-title" id="game-over-title">GEWONNEN!</div>
  <div class="death-stats" id="game-over-stats">Score: 5 - 2</div>
  <button class="play-btn" id="restart-btn" style="max-width: 300px;">OPNIEUW SPELEN</button>
</div>

<!-- Firebase SDK -->
<script src="../static/js/firebase-app-compat.js"></script>
<script src="../static/js/firebase-database-compat.js"></script>
<script src="../static/js/firebase-config.js"></script>

<script src="smartpong-io.js"></script>
</body>
</html>
