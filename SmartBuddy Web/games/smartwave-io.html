<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SmartWave.io</title>
<style>
:root {
  --sg-accent: #2dd4bf;
  --sg-base01: #080808;
  --sg-border: rgba(45,212,191,0.2);
  --sg-text: #ffffff;
  --sg-muted: #888888;
}

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--sg-base01); font-family: 'Inter', system-ui, sans-serif; overflow: hidden; color: var(--sg-text); touch-action: none; user-select: none; }
canvas { display: block; }

/* ?? HUD ?? */
#ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

#hud-score { position: absolute; top: 24px; right: 24px; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
#score-val { font-size: clamp(32px, 4vw, 56px); font-weight: 900; letter-spacing: -0.03em; color: #ffffff; line-height: 1; }
#speed-badge { margin-top: 8px; font-size: 13px; letter-spacing: 2px; padding: 6px 16px; border: 1px solid rgba(45, 212, 191, 0.4); border-radius: 24px; background: rgba(45, 212, 191, 0.1); color: #2dd4bf; font-weight: 800; text-transform: uppercase; }

#leaderboard { position: absolute; top: 24px; left: 24px; background: #1a1a1a; border: 1px solid var(--sg-border); border-radius: 12px; padding: 20px 24px; min-width: 220px; }
#leaderboard h3 { font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: var(--sg-accent); margin-bottom: 16px; font-weight: 800; border-bottom: 1px solid var(--sg-border); padding-bottom: 12px; }
.lb-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 13px; font-weight: 600; }
.lb-rank { color: var(--sg-muted); font-size: 11px; width: 18px; font-weight: 800; }
.lb-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; background: #444; }
.lb-dot.gold { background: #fbbf24; }
.lb-dot.silver { background: #94a3b8; }
.lb-dot.bronze { background: #b45309; }
.lb-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #eee; }
.lb-score { color: var(--sg-accent); font-size: 12px; font-weight: 800; }

#ctrl-hint { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); font-size: 12px; letter-spacing: 3px; color: var(--sg-muted); font-weight: 700; text-transform: uppercase; text-align: center; }

/* Screens */
.screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; pointer-events: all; padding: 24px; text-align: center; }
.hidden { display: none !important; }

/* Start Screen */
#start-screen { background: var(--sg-base01); }
#start-bg { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
#start-content { position: relative; z-index: 1; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 50px 40px; width: 600px; max-width: 90vw; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }

.game-title { font-size: clamp(48px, 8vw, 64px); font-weight: 900; letter-spacing: -0.04em; margin-bottom: 8px; line-height: 1; }
.game-title .t1 { color: #fff; }
.game-title .t2 { color: var(--sg-accent); }
.game-sub { font-size: 13px; letter-spacing: 6px; text-transform: uppercase; color: var(--sg-muted); margin-bottom: 40px; font-weight: 700; }

.play-btn { background: var(--sg-accent); border: none; border-radius: 12px; padding: 18px 48px; font-size: 16px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #000; cursor: pointer; transition: all 0.2s cubic-bezier(0.16,1,0.3,1); font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 32px; }
.play-btn:hover { transform: translateY(-3px); background: #34e6d0; }
.play-btn:active { transform: translateY(1px); }

.start-lb { background: #111111; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; margin-bottom: 24px; text-align: left; width: 100%; box-sizing: border-box; }
.start-lb h4 { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--sg-muted); margin-bottom: 12px; font-weight: 700; }
.start-lb-row { display: flex; justify-content: space-between; font-size: 13px; color: #ccc; margin-bottom: 8px; font-weight: 600; }
.start-lb-row:last-child { margin-bottom: 0; }
.start-lb-row span:last-child { color: var(--sg-accent); font-weight: 800; }

.online-count { font-size: 13px; color: var(--sg-muted); display: flex; align-items: center; gap: 8px; justify-content: center; font-weight: 600; }
.online-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulseGreen 2s ease-in-out infinite; }
@keyframes pulseGreen { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

/* Death Screen */
#death-screen { background: #111111; }
.death-title { font-size: clamp(48px, 8vw, 72px); font-weight: 900; letter-spacing: -0.04em; color: #ef4444; margin-bottom: 24px; }
.death-stats { display: flex; gap: 32px; justify-content: center; margin-bottom: 48px; }
.death-stat { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px 32px; min-width: 140px; }
.death-stat-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--sg-muted); font-weight: 700; margin-bottom: 8px; }

</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="ui">
  <div id="hud-score">
    <div id="score-val">0m</div>
    <div id="speed-badge">Speed ×1.0</div>
  </div>
  <!-- Leaderboard removed from HUD -->
  <div id="ctrl-hint">KLIK / SPATIE OM TE STUREN</div>
</div>

<!-- Start -->
<div id="start-screen" class="screen">
  <canvas id="start-bg"></canvas>
  <div id="start-content">
    <div class="game-title" style="color: #fff;"><span class="t1">Smart</span><span class="t2">Wave.io</span></div>
    <div class="game-sub" style="font-size: 14px; letter-spacing: 2px; color: #888; margin-bottom: 30px; text-transform: uppercase;">Neon Cave Runner</div>
    
    <div class="start-lb">
      <h4>Top Scores</h4>
      <div id="start-lb-list"></div>
    </div>

    <button class="play-btn" id="start-btn">SPELEN</button>
    
  </div>
</div>

<!-- Death -->
<div id="death-screen" class="screen hidden">
  <div class="death-title">NEERGESTORT</div>
  <div class="death-stats">
    <div class="death-stat">
      <div class="death-stat-label">Afstand</div>
      <div class="death-stat-val" id="final-score">0m</div>
    </div>
    <div class="death-stat">
      <div class="death-stat-label">Snelheid</div>
      <div class="death-stat-val" id="final-speed">×1.0</div>
    </div>
  </div>
  <button class="play-btn" id="restart-btn" style="max-width: 300px;">OPNIEUW</button>
</div>
<!-- Firebase SDK -->
<script src="../static/js/firebase-app-compat.js"></script>
<script src="../static/js/firebase-database-compat.js"></script>
<script src="../static/js/firebase-config.js"></script>

<script src="smartwave-io.js"></script>
</body>
</html>
